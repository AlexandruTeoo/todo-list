<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
    <div class="sidebar">
        <input type="text" placeholder="Search">
        <h3>Task</h3>
        <ul id="tasks-list">
            <li data-filter="upcoming">Upcoming</li>
            <li data-filter="today">Today</li>
            <li data-filter="calendar">Calendar</li>
            <li data-filter="sticky">Sticky Wall</li>
        </ul>
        <h3>Categories</h3>
        <ul id="categories-list"></ul>
        <button id="add-category">Add New Category</button>
    </div>
    <div class="main">
        <div class="todo-list">
            <h1>Some Title</h1>
            <div>blah blah blah</div>
            <div class="todo-item">Coffee</div>
        </div>
        <div class="todo-detailsPanel">
            <h3>Task</h3>
            <label id="task-name">Task Name</label>
            <label id="task-description">Description</label>
            <div>blah blah blah</div>
            <h3>Subtasks</h3>
            <div id="details-footer">
                <button>Delete Task</button>
                <button>Save Changes</button>
            </div>
        </div>
    </div>
</body>
</html>
